<div class="flex justify-center items-center min-h-[calc(100vh-64px)] p-5">
  <div class="bg-white rounded-xl p-10 w-full max-w-[400px] shadow-xl">
    <div class="text-center mb-8">
      <span class="text-5xl">🏠</span>
      <h1 class="mt-2 mb-1 text-[#1a237e] text-2xl">Reset Password</h1>
      <p class="text-gray-500 m-0 text-sm">Enter your new password below</p>
    </div>

    <div class="bg-[#ffebee] text-[#d32f2f] p-3 rounded-lg mb-4 text-sm" *ngIf="!token">
      ⚠️ Invalid reset link. Please request a new one.
      <br><a routerLink="/auth/forgot-password" class="text-[#d32f2f] font-semibold">Request new link</a>
    </div>

    <ng-container *ngIf="token && !done">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-5">
          <label class="block font-semibold mb-[6px] text-gray-800 text-sm">New Password</label>
          <input type="password" formControlName="newPassword" placeholder="Min. 6 characters"
            class="w-full p-3 border-[1.5px] border-[#ddd] rounded-lg text-[15px] box-border transition-colors focus:outline-none focus:border-[#1a237e]" />
          <span class="text-[#d32f2f] text-xs mt-1 block" *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">
            Password must be at least 6 characters
          </span>
        </div>

        <div class="mb-5">
          <label class="block font-semibold mb-[6px] text-gray-800 text-sm">Confirm Password</label>
          <input type="password" formControlName="confirmPassword" placeholder="Repeat password"
            class="w-full p-3 border-[1.5px] border-[#ddd] rounded-lg text-[15px] box-border transition-colors focus:outline-none focus:border-[#1a237e]" />
          <span class="text-[#d32f2f] text-xs mt-1 block" *ngIf="form.get('confirmPassword')?.touched && form.hasError('mismatch')">
            Passwords do not match
          </span>
        </div>

        <div class="bg-[#ffebee] text-[#d32f2f] p-3 rounded-lg mb-4 text-sm" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button type="submit" [disabled]="loading"
          class="w-full py-[14px] bg-[#1a237e] text-white border-0 rounded-lg text-base font-semibold cursor-pointer transition-colors hover:bg-[#283593] disabled:opacity-60 disabled:cursor-not-allowed">
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
      </form>
    </ng-container>

    <div class="bg-[#e8f5e9] text-[#2e7d32] p-4 rounded-lg text-sm leading-[1.5]" *ngIf="done">
      ✅ Password reset successfully! <a routerLink="/auth/login" class="text-[#1b5e20] font-semibold">Login now →</a>
    </div>

    <p class="text-center mt-5 text-sm" *ngIf="!done">
      <a routerLink="/auth/login" class="text-[#1a237e] font-semibold no-underline">← Back to Login</a>
    </p>
  </div>
</div>
