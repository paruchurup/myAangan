<div class="page">
  <div class="page-header">
    <div class="header-row">
      <a class="back-btn" routerLink="/helpdesk">← Back</a>
    </div>
    <h1>🛠️ Raise Service Request</h1>
    <p>Submit a maintenance or service request</p>
  </div>

  <div class="form-wrap">

    <!-- Category -->
    <div class="form-section">
      <div class="form-section-title">Category</div>
      <div class="grid grid-cols-2 gap-2">
        <button class="cat-btn" *ngFor="let cat of categories"
          [class.selected]="form.category === cat.key"
          [style.border-color]="form.category === cat.key ? cat.color : ''"
          (click)="form.category = cat.key">
          <span class="cat-icon">{{ cat.icon }}</span>
          <span class="cat-label" [style.color]="form.category === cat.key ? cat.color : ''">{{ cat.label }}</span>
        </button>
      </div>
    </div>

    <!-- Details -->
    <div class="form-section">
      <div class="form-section-title">Details</div>
      <div class="field">
        <label>Title *</label>
        <input [(ngModel)]="form.title" placeholder="e.g. Kitchen tap leaking, Power socket not working" />
      </div>
      <div class="field">
        <label>Description *</label>
        <textarea [(ngModel)]="form.description" rows="4"
          placeholder="Location, how long the issue has been happening, any other relevant details…"></textarea>
      </div>
    </div>

    <!-- Preferred Time -->
    <div class="form-section">
      <div class="form-section-title">Preferred Time <span class="opt">(optional)</span></div>
      <div class="field">
        <label>Suggest a date & time</label>
        <input type="datetime-local" [(ngModel)]="form.preferredDatetime" />
        <small>FM will confirm or suggest an alternative slot</small>
      </div>
    </div>

    <!-- Photos -->
    <div class="form-section">
      <div class="form-section-title">Photos <span class="opt">(up to 3)</span></div>
      <div class="flex flex-wrap gap-2 items-start">
        <div class="preview-item" *ngFor="let p of previews; let i = index">
          <img [src]="p" /><button class="rm-btn" (click)="removePhoto(i)">✕</button>
        </div>
        <label class="add-photo" for="photos" *ngIf="photos.length < 3">
          <span style="font-size:22px">📷</span><span>Add</span>
        </label>
        <input type="file" id="photos" (change)="onPhotos($event)" accept="image/*" multiple class="hidden" />
      </div>
    </div>

    <div class="form-err" *ngIf="error">{{ error }}</div>
    <button class="btn-submit" (click)="submit()" [disabled]="saving">
      {{ saving ? 'Submitting…' : '📤 Submit Request' }}
    </button>

  </div>
</div>
