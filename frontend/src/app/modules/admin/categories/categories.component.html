<div class="min-h-screen bg-[#f5f6fa] pb-20">

  <div class="page-header">
    <div class="flex justify-between items-center mb-3">
      <a class="back-btn" routerLink="/dashboard">← Back</a>
    </div>
    <h1 class="text-[22px] font-bold m-0 mb-1">📂 Service Categories</h1>
    <p class="text-[13px] text-white/70 m-0">Manage service directory categories</p>
  </div>

  <!-- Add Category Form -->
  <div class="bg-white mx-4 rounded-[14px] p-4 mt-2 shadow-md">
    <h3 class="text-[15px] font-bold m-0 mb-3 text-[#1a1a2e]">Add New Category</h3>
    <div class="flex gap-2 items-center">
      <input
        type="text"
        [(ngModel)]="newIcon"
        placeholder="Icon (emoji)"
        class="icon-input"
        maxlength="4"
      />
      <input
        type="text"
        [(ngModel)]="newName"
        placeholder="Category name"
        class="name-input"
        (keyup.enter)="addCategory()"
      />
      <button class="btn-add" (click)="addCategory()"
        [disabled]="!newName.trim() || adding">
        {{ adding ? '...' : '+ Add' }}
      </button>
    </div>
    <div class="text-[#dc2626] text-xs mt-2" *ngIf="addError">{{ addError }}</div>
    <div class="text-[#166534] text-xs mt-2" *ngIf="addSuccess">✅ Category added!</div>
  </div>

  <!-- Categories List -->
  <div class="px-4">
      <h3 class="text-rg font-bold text-navy-dark my-2 mb-3">All Categories</h3>
      <div class="text-center text-muted p-5" *ngIf="loading">Loading...</div>
      <div class="flex flex-col gap-2">
          <div class="cat-card" *ngFor="let cat of categories; let i = index"
               [class.inactive]="!cat.active"
               [ngClass]="i % 2 === 0 ? 'bg-surface' : 'bg-row-alt'">
          <!-- View mode -->
        <ng-container *ngIf="editingId !== cat.id">
          <div class="text-[26px] flex-shrink-0 w-9 text-center">{{ cat.icon || '🔧' }}</div>
          <div class="flex-1">
              <div class="text-rg font-semibold text-navy-dark">{{ cat.name }}</div>
              <div class="text-badge mt-[2px]"
                   [ngClass]="cat.active ? 'text-green-dark' : 'text-faint'">
              {{ cat.active ? 'Active' : 'Inactive' }}
            </div>
          </div>
          <div class="flex gap-[6px]">
            <button class="btn-icon btn-edit" (click)="startEdit(cat)">✏️</button>
            <button class="btn-icon btn-del" (click)="deleteCategory(cat)"
              *ngIf="cat.active">🗑</button>
          </div>
        </ng-container>

        <!-- Edit mode -->
        <ng-container *ngIf="editingId === cat.id">
          <input [(ngModel)]="editIcon" class="edit-icon" maxlength="4" />
          <input [(ngModel)]="editName" class="edit-name"
            (keyup.enter)="saveEdit(cat)" />
          <div class="flex gap-[6px]">
            <button class="btn-icon btn-save" (click)="saveEdit(cat)">✅</button>
            <button class="btn-icon btn-cancel" (click)="cancelEdit()">✕</button>
          </div>
        </ng-container>

      </div>
    </div>
  </div>

</div>
