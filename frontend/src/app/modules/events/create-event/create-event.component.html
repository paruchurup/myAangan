<div class="page">
  <div class="page-header">
    <div class="header-row">
      <a class="back-btn" routerLink="/events">← Back</a>
    </div>
    <h1>🎉 Create Event</h1>
    <p>Schedule a new society event</p>
  </div>

  <div class="form-wrap">

    <!-- Event Details -->
    <div class="form-section">
      <div class="form-section-title">Event Details</div>
      <div class="field"><label>Event Name *</label>
        <input [(ngModel)]="form.name" placeholder="e.g. Diwali Celebration 2025" /></div>
      <div class="field"><label>Description</label>
        <textarea [(ngModel)]="form.description" rows="3" placeholder="Tell residents what to expect…"></textarea></div>
      <div class="grid grid-cols-2 gap-[10px]">
        <div class="field"><label>Date & Time *</label>
          <input type="datetime-local" [(ngModel)]="form.eventDate" /></div>
        <div class="field"><label>Venue</label>
          <input [(ngModel)]="form.venue" placeholder="e.g. Clubhouse" /></div>
      </div>
      <div class="field"><label>Estimated Budget (₹) *</label>
        <input type="number" [(ngModel)]="form.estimatedBudget" placeholder="e.g. 15000" /></div>
    </div>

    <!-- Approval Settings -->
    <div class="form-section">
      <div class="form-section-title">Approval Settings</div>
      <div class="grid grid-cols-2 gap-[10px]">
        <div class="field">
          <label>Quorum % (min voters required) *</label>
          <input type="number" [(ngModel)]="form.quorumPct" min="10" max="100" placeholder="e.g. 50" />
          <small>Event approved if ≥ this % vote AND majority says YES</small>
        </div>
        <div class="field">
          <label>Voting Deadline *</label>
          <input type="datetime-local" [(ngModel)]="form.voteDeadline" />
        </div>
      </div>
    </div>

    <!-- Volunteer Roles -->
    <div class="form-section">
      <div class="form-section-title">Volunteer Roles <span class="opt">(optional)</span></div>
      <div class="flex flex-col gap-2">
        <div class="slot-row" *ngFor="let slot of slots; let i = index">
          <div class="flex-1 flex gap-2 flex-wrap">
            <input [(ngModel)]="slot.roleName" placeholder="Role (e.g. Decoration)" class="slot-name" />
            <input [(ngModel)]="slot.roleDescription" placeholder="Description" class="slot-desc" />
            <div class="flex items-center gap-1">
              <span class="slot-max-label">Max</span>
              <input type="number" [(ngModel)]="slot.maxVolunteers" min="1" max="50" class="slot-num" />
            </div>
          </div>
          <button class="slot-rm" (click)="removeSlot(i)">✕</button>
        </div>
      </div>
      <button class="add-slot-btn" (click)="addSlot()">+ Add Volunteer Role</button>
    </div>

    <div class="form-err" *ngIf="error">{{ error }}</div>
    <button class="btn-submit" (click)="submit()" [disabled]="saving">
      {{ saving ? 'Creating…' : '🎉 Create Event (as Draft)' }}
    </button>
    <p style="font-size:11px;color:#888;text-align:center;margin:0">Event will be saved as Draft. You can open voting when ready.</p>

  </div>
</div>
