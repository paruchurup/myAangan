<div class="min-h-screen bg-[#f5f6fa] pb-20" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#212121">
  <div style="background:linear-gradient(135deg,#1a1a2e,#0f3460)" class="p-4 pb-6 text-white">
    <div class="flex justify-between items-center mb-3">
      <a class="back-btn" routerLink="/events">← Back</a>
    </div>
    <h1 class="text-[22px] font-bold mb-1 mt-0">🎉 Create Event</h1>
    <p class="text-sm m-0" style="color:rgba(255,255,255,0.7)">Schedule a new society event</p>
  </div>

  <div class="p-[14px] flex flex-col gap-3">
    <div class="section-label">EVENT DETAILS</div>
    <div class="flex flex-col gap-1"><label>Event Name *</label><input [(ngModel)]="form.name" placeholder="e.g. Diwali Celebration 2025" /></div>
    <div class="flex flex-col gap-1"><label>Description</label><textarea [(ngModel)]="form.description" rows="3" placeholder="Tell residents what to expect…"></textarea></div>
    <div class="grid grid-cols-2 gap-[10px]">
      <div class="flex flex-col gap-1"><label>Event Date & Time *</label><input type="datetime-local" [(ngModel)]="form.eventDate" /></div>
      <div class="flex flex-col gap-1"><label>Venue</label><input [(ngModel)]="form.venue" placeholder="e.g. Clubhouse" /></div>
    </div>
    <div class="flex flex-col gap-1"><label>Estimated Budget (₹) *</label><input type="number" [(ngModel)]="form.estimatedBudget" placeholder="e.g. 15000" /></div>

    <div class="section-label">APPROVAL SETTINGS</div>
    <div class="grid grid-cols-2 gap-[10px]">
      <div class="flex flex-col gap-1">
        <label>Quorum % (min residents who must vote) *</label>
        <input type="number" [(ngModel)]="form.quorumPct" min="10" max="100" placeholder="e.g. 50" />
        <small>Event approved if ≥ this % vote AND majority says YES</small>
      </div>
      <div class="flex flex-col gap-1">
        <label>Voting Deadline *</label>
        <input type="datetime-local" [(ngModel)]="form.voteDeadline" />
      </div>
    </div>

    <div class="section-label">VOLUNTEER ROLES <span class="text-[#4b5563] text-[9px]">(optional)</span></div>
    <div class="flex flex-col gap-2">
      <div class="flex gap-2 items-center bg-[#252525] border border-[#333] rounded-lg p-2" *ngFor="let slot of slots; let i = index">
        <div class="flex-1 flex gap-2 flex-wrap">
          <input [(ngModel)]="slot.roleName" placeholder="Role name (e.g. Decoration)" class="slot-name" />
          <input [(ngModel)]="slot.roleDescription" placeholder="Description" class="slot-desc" />
          <div class="flex items-center gap-1">
            <label class="whitespace-nowrap text-[10px] text-[#6b7280]">Max</label>
            <input type="number" [(ngModel)]="slot.maxVolunteers" min="1" max="50" class="slot-num" />
          </div>
        </div>
        <button class="bg-transparent border-none text-[#4b5563] text-base cursor-pointer py-1 px-[6px] flex-shrink-0 hover:text-[#ef4444]" (click)="removeSlot(i)">✕</button>
      </div>
    </div>
    <button class="add-slot-btn" (click)="addSlot()">+ Add Volunteer Role</button>

    <div class="bg-[rgba(239,68,68,0.1)] border border-[#ef4444] text-[#f87171] py-2 px-3 rounded-md text-xs" *ngIf="error">{{ error }}</div>
    <button class="submit-btn" (click)="submit()" [disabled]="saving">
      {{ saving ? 'Creating…' : '🎉 Create Event (as Draft)' }}
    </button>
    <div class="text-[11px] text-[#4b5563] text-center">Event will be saved as Draft. You can open voting when ready.</div>
  </div>
</div>
