<div class="page">
  <div class="page-header">
    <div class="header-row">
      <a class="back-btn" routerLink="/dashboard">← Back</a>
    </div>
    <h1>👤 My Profile</h1>
    <p>Your account details</p>
  </div>

  <!-- Profile summary card -->
  <div class="form-wrap">
    <div class="form-section" *ngIf="user">
      <div class="profile-summary">
        <div class="avatar">{{ user.firstName[0] }}{{ user.lastName[0] }}</div>
        <div>
          <h3 class="profile-name">{{ user.firstName }} {{ user.lastName }}</h3>
          <p class="profile-email">{{ user.email }}</p>
          <span class="badge">{{ user.role }}</span>
          <span class="status-badge" [class.active]="user.status === 'ACTIVE'">{{ user.status }}</span>
        </div>
      </div>
    </div>

    <!-- Edit Profile -->
    <div class="form-section">
      <div class="form-section-title">Edit Profile</div>
      <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
        <div class="grid grid-cols-2 gap-3">
          <div class="field"><label>First Name</label><input formControlName="firstName" /></div>
          <div class="field"><label>Last Name</label><input formControlName="lastName" /></div>
        </div>
        <div class="field"><label>Phone</label><input formControlName="phone" /></div>
        <div class="form-success" *ngIf="profileSuccess">{{ profileSuccess }}</div>
        <div class="form-err" *ngIf="profileError">{{ profileError }}</div>
        <button type="submit" class="btn-submit" [disabled]="savingProfile">
          {{ savingProfile ? 'Saving...' : 'Save Changes' }}
        </button>
      </form>
    </div>

    <!-- Change Password -->
    <div class="form-section">
      <div class="form-section-title">Change Password</div>
      <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
        <div class="field"><label>Current Password</label><input type="password" formControlName="currentPassword" /></div>
        <div class="field"><label>New Password</label><input type="password" formControlName="newPassword" /></div>
        <div class="form-success" *ngIf="passwordSuccess">{{ passwordSuccess }}</div>
        <div class="form-err" *ngIf="passwordError">{{ passwordError }}</div>
        <button type="submit" class="btn-submit btn-secondary" [disabled]="changingPassword">
          {{ changingPassword ? 'Changing...' : 'Change Password' }}
        </button>
      </form>
    </div>
  </div>
</div>
