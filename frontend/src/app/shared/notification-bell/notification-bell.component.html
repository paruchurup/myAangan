<div class="relative inline-block">
  <button class="bg-transparent border-0 text-xl cursor-pointer relative py-1 px-[6px] leading-none" (click)="toggle($event)">
    🔔
    <span class="absolute -top-[2px] -right-[2px] bg-[#ef4444] text-white text-[9px] font-bold min-w-[16px] h-4 rounded-lg flex items-center justify-center px-[3px] nb-badge-font"
      *ngIf="unread > 0">{{ unread > 99 ? '99+' : unread }}</span>
  </button>

  <div class="absolute top-[calc(100%+6px)] right-0 w-[320px] bg-[#1e1e1e] border border-[#333] rounded-xl shadow-[0_8px_32px_rgba(0,0,0,0.5)] z-[1000] overflow-hidden max-h-[480px] flex flex-col nb-font"
    *ngIf="open" (click)="$event.stopPropagation()">
    <div class="py-3 px-[14px] border-b border-[#2a2a2a] flex justify-between items-center flex-shrink-0">
      <span class="text-sm font-bold text-white nb-title-font">Notifications</span>
      <button class="bg-transparent border-0 text-[#6366f1] text-[11px] cursor-pointer p-0" (click)="markAll()" *ngIf="unread > 0">Mark all read</button>
    </div>
    <div class="flex justify-center p-5" *ngIf="loading">
      <div class="w-5 h-5 border-2 border-[#333] border-t-[#6366f1] rounded-full nb-spinner"></div>
    </div>
    <div class="text-center py-[30px] px-5 text-[#4b5563] text-[13px] flex flex-col items-center gap-[6px]" *ngIf="!loading && notifications.length === 0">
      <div class="text-[28px]">🔔</div><div>No notifications yet</div>
    </div>
    <div class="overflow-y-auto flex-1">
      <div class="flex gap-[10px] py-[11px] px-[14px] border-b border-[#2a2a2a] cursor-pointer relative transition-colors duration-100 hover:bg-[#252525]"
        *ngFor="let n of notifications"
        [class.bg-[#1a1a2a]]="!n.isRead"
        (click)="onItemClick(n)">
        <div class="text-xl flex-shrink-0 w-7 text-center pt-[1px]">{{ typeIcon(n.type) }}</div>
        <div class="flex-1 min-w-0">
          <div class="text-xs font-semibold text-[#e8e8e8] mb-[2px]">{{ n.title }}</div>
          <div class="text-[11px] text-[#9ca3af] leading-[1.4] overflow-hidden nb-clamp">{{ n.body }}</div>
          <div class="text-[10px] text-[#4b5563] mt-[3px]">{{ timeAgo(n.createdAt) }}</div>
        </div>
        <div class="w-[7px] h-[7px] bg-[#6366f1] rounded-full flex-shrink-0 mt-1" *ngIf="!n.isRead"></div>
      </div>
    </div>
    <a class="block text-center py-[10px] text-xs text-[#6366f1] no-underline border-t border-[#2a2a2a] flex-shrink-0 hover:bg-[#252525]"
      routerLink="/notifications" (click)="open=false">See all notifications →</a>
  </div>
</div>
