# Server
server.port=9000
server.address=0.0.0.0

# Database
# NOTE: Spring Boot uses ${VAR:-default} syntax for env var defaults
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:myaangandb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP (connection pool) - tune as needed
# max pool size: maximum number of connections in the pool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
# minimum number of idle connections maintained in the pool
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
# maximum amount of time (ms) a connection is allowed to sit idle in the pool
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT_MS:300000}
# maximum lifetime (ms) of a connection in the pool; should be shorter than DB's timeout
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME_MS:1800000}
# maximum time (ms) to wait for a connection from the pool before timing out
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT_MS:30000}
# how long to wait for the pool to be successfully seeded on startup before failing (ms)
spring.datasource.hikari.initialization-fail-timeout=${HIKARI_INIT_FAIL_TIMEOUT_MS:60000}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:-MyAanganSecretKey2024VeryLongSecretKeyForHS256AlgorithmMinimum256Bits}
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5000,http://localhost,http://192.168.1.34:5000,http://192.168.1.34:5000,http://117.198.97.8:5000,http://117.198.97.8:5000}

# Logging
logging.level.com.myaangan=INFO
logging.level.org.springframework.security=WARN

# File Upload (Phase 2B)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=60MB
app.upload.dir=/app/uploads/photos

# Complaint file uploads (Phase 4)
app.upload.complaints.dir=/app/uploads/complaints

# Maintenance receipts
app.upload.receipts.dir=${RECEIPTS_DIR:/app/uploads/receipts}

