# Server
server.port=8080

# Database
# NOTE: Spring Boot uses ${VAR:-default} syntax for env var defaults
spring.datasource.url=jdbc:mysql://${DB_HOST:-localhost}:3306/${DB_NAME:-myaangandb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:-root}
spring.datasource.password=${DB_PASSWORD:-password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:-MyAanganSecretKey2024VeryLongSecretKeyForHS256AlgorithmMinimum256Bits}
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:-http://localhost:4200,http://localhost}

# Logging
logging.level.com.myaangan=INFO
logging.level.org.springframework.security=WARN
